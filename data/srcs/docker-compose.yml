services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    restart: on-failure

  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    env_file:
      - .env
    secrets:
      - db_password
      - credentials
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - mariadb
      - redis
    restart: on-failure

  nginx:
    build: ./requirements/nginx
    image: nginx
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - wordpress
    restart: on-failure

  static:
    build: ./requirements/bonus/static
    image: static
    networks:
      - inception
    ports:
      - "80:80"
    restart: on-failure

  adminer:
    build: ./requirements/bonus/adminer
    image: adminer
    networks:
      - inception
    ports:
      - "8080:8080"
    depends_on:
      - mariadb
    restart: on-failure

  ftp:
    build: ./requirements/bonus/ftp
    image: ftp
    env_file:
      - .env
    secrets:
      - db_password
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    ports:
      - "20:20"
      - "21:21"
      - "21100-21110:21100-21110"
    depends_on:
      - wordpress
    restart: on-failure

  redis:
    build: ./requirements/bonus/redis
    image: redis
    networks:
      - inception
    restart: on-failure

  uptime:
    build: ./requirements/bonus/uptime
    image: uptime
    volumes:
      - uptime_data:/app/data
    networks:
      - inception
    ports:
      - "3001:3001"
    restart: on-failure

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/astefane/Inception/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/astefane/Inception/data/wordpress

  uptime_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/astefane/Inception/data/uptime

networks:
  inception:
    driver: bridge

secrets:
  db_password:
    file: ../../secrets/db_password.txt
  db_root_password:
    file: ../../secrets/db_root_password.txt
  credentials:
    file: ../../secrets/credentials.txt