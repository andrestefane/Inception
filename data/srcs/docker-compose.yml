services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    restart: on-failure

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    env_file:
      - .env
    secrets:
      - db_password
      - credentials
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - mariadb
      - redis
    restart: on-failure

  nginx:
      build: ./requirements/nginx
      container_name: nginx
      ports:
        - "443:443"
      volumes:
        - wordpress_data:/var/www/wordpress
      networks:
        - inception
      depends_on:
        - wordpress
      restart: on-failure

  static:
    build: ./requirements/bonus/static
    container_name: static
    networks:
      - inception
    ports:
      - "80:80"
    restart: on-failure
  
  adminer:
    build: ./requirements/bonus/adminer
    container_name: adminer
    networks:
      - inception
    ports:
      - "8080:8080"
    depends_on:
      - mariadb
    restart: on-failure
  
  ftp:
    build: ./requirements/bonus/ftp
    container_name: ftp
    env_file:
      - .env
    secrets:
      - db_password
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    ports:
      - "20:20"
      - "21:21"
      - "21100-21110:21100-21110"
    depends_on:
      - wordpress
    restart: no

  redis:
    build: ./requirements/bonus/redis
    container_name: redis
    networks:
      - inception
    restart: on-failure

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/astefane/Inception/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/astefane/Inception/data/wordpress

networks:
  inception:
    driver: bridge

secrets:
  db_password:
    file: ../../secrets/db_password.txt
  db_root_password:
    file: ../../secrets/db_root_password.txt
  credentials:
    file: ../../secrets/credentials.txt